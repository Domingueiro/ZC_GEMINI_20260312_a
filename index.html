<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --azul-vivo: #005fa3; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --vermelho-alerta: rgba(211, 47, 47, 0.2);
            --texto: #1a1e27; --cinza2: #dde1e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* --- PORTAL (ENTRADA) --- */
        #portal-entrada { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal-card { text-align: center; max-width: 550px; width: 100%; padding: 50px; background: rgba(255, 255, 255, 0.4); border-radius: 28px; backdrop-filter: blur(10px); border: 1px solid rgba(26, 58, 92, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 52px; margin: 0; color: var(--accent); }
        .portal-lema-icon { display: block; width: 100%; background-color: #000000; color: var(--ouro-alaranjado); font-family: 'Syne', sans-serif; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; padding: 18px 20px; border-radius: 12px; margin: 20px 0 40px; border: 2px solid var(--ouro-alaranjado); }
        .opcoes-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .portal-input-group { display: flex; align-items: center; background: var(--white); border: 2px solid var(--accent); border-radius: 14px; overflow: hidden; }
        .btn-trigger-cep { background: var(--accent); color: white; font-family: 'DM Mono', monospace; font-weight: bold; padding: 20px 30px; cursor: pointer; border: none; font-size: 18px; }
        .portal-input-group input { border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 24px; width: 100%; padding: 15px; background: transparent; }
        .btn-geo-full { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--white); color: var(--accent); border: 2px solid var(--accent); border-radius: 14px; padding: 20px; font-weight: 700; cursor: pointer; font-family: 'Syne'; font-size: 16px; text-transform: uppercase; }

        /* --- SISTEMA (ABAS / CARROSSEL) --- */
        #sistema-auditoria { display: none; padding-bottom: 80px; }
        header { background: var(--azul); color: var(--white); padding: 20px; text-align: center; }
        header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--ouro); letter-spacing: 2px; }

        .tabs-nav { display: flex; background: var(--white); border-bottom: 2px solid var(--cinza2); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-family: 'Syne'; font-size: 0.8rem; font-weight: 700; color: var(--muted); cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: var(--azul); border-bottom: 3px solid var(--azul); }

        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }

        #map { height: 400px; margin: 10px; border-radius: 12px; border: 2px solid var(--cinza2); }

        /* CARDS E ALERTAS */
        .card-alerta { background: var(--white); border-radius: 10px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--vermelho); transition: all 0.3s; }
        .card-alerta.highlight { background: #fff0f0; border-color: #ff0000; transform: scale(1.02); box-shadow: 0 5px 15px rgba(211,47,47,0.2); }
        .alerta-titulo { font-family: 'Syne'; font-weight: 700; color: var(--vermelho); font-size: 1.1rem; }
        .alerta-meta { font-family: 'DM Mono'; font-size: 0.7rem; color: var(--muted); margin-bottom: 10px; }

        /* RADAR ANIMATION */
        @keyframes pulse-red { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .radar-pulse { width: 18px; height: 18px; background: var(--vermelho); border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .radar-pulse::after { content: ''; width: 100%; height: 100%; background: var(--vermelho); border-radius: 50%; position: absolute; animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="portal-lema-icon">Transformando Visão em Poder</div>
        <div class="opcoes-container">
            <div class="portal-input-group">
                <button class="btn-trigger-cep" onclick="entrarPeloPortal()">CEP</button>
                <input type="text" id="portal-cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
            </div>
            <button class="btn-geo-full" onclick="entrarPelaGeo()">📍 USAR GEOLOCALIZAÇÃO</button>
        </div>
    </div>
</div>

<div id="sistema-auditoria">
    <header>
        <h1>⚖ ZELADOR CÍVICO</h1>
    </header>

    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('radar')">Radar</button>
        <button class="tab-btn" onclick="switchTab('alertas')">Alertas</button>
        <button class="tab-btn" onclick="switchTab('investimento')">Investimento</button>
    </nav>

    <div id="tab-radar" class="tab-content active">
        <div id="map"></div>
    </div>

    <div id="tab-alertas" class="tab-content">
        <div id="lista-alertas">
            </div>
    </div>

    <div id="tab-investimento" class="tab-content">
        <div style="padding: 20px; text-align: center;">
            <h3>Arrecadação vs. Investimento</h3>
            <p>Módulo CHAVE-SEGURANÇA em desenvolvimento...</p>
        </div>
    </div>
</div>

<script>
    var mapa = null;
    var camadaAlertas = L.layerGroup();
    
    // BANCO DE DADOS DE ALERTAS
    const DATABASE_ALERTAS = [
        { id: "a1", titulo: "Sobrepreço em Licitação", desc: "Contrato de manutenção de calçadas apresenta valores 40% acima da média municipal.", status: "Em Análise", tipo: "Financeiro" },
        { id: "a2", titulo: "Obra Paralisada", desc: "A reforma da unidade local está abandonada há mais de 90 dias sem justificativa.", status: "Urgente", tipo: "Infraestrutura" },
        { id: "a3", titulo: "Déficit de Pavimentação", desc: "Área com alta arrecadação de IPTU, mas sem recapeamento há 10 anos.", status: "Crítico", tipo: "Urbanismo" }
    ];

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
        
        if(tabId === 'radar' && mapa) {
            setTimeout(() => mapa.invalidateSize(), 200);
        }
    }

    // Máscara CEP
    document.getElementById('portal-cep-input').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'');
        if(v.length > 5) v = v.slice(0,5) + '-' + v.slice(5,8);
        e.target.value = v;
    });

    function entrarPeloPortal() {
        const cep = document.getElementById('portal-cep-input').value.replace(/\D/g,'');
        if(cep.length === 8) {
            document.getElementById('portal-entrada').style.display = 'none';
            document.getElementById('sistema-auditoria').style.display = 'block';
            inicializarMapa();
            processarCEP(cep);
        }
    }

    function inicializarMapa() {
        if (!mapa) {
            mapa = L.map('map').setView([-23.5505, -46.6333], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            camadaAlertas.addTo(mapa);
        }
    }

    async function processarCEP(cep) {
        const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const d = await r.json();
        const geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(d.logradouro + ", São Paulo")}`);
        const gd = await geo.json();
        
        if (gd[0]) {
            const lat = parseFloat(gd[0].lat), lon = parseFloat(gd[0].lon);
            mapa.setView([lat, lon], 16);
            L.marker([lat, lon]).addTo(mapa).bindPopup("Você está aqui").openPopup();
            
            gerarRadar(lat, lon);
            gerarListaAlertas();
        }
    }

    function gerarRadar(lat, lon) {
        camadaAlertas.clearLayers();
        DATABASE_ALERTAS.forEach((alerta, i) => {
            const rLat = lat + (Math.random() - 0.5) * 0.004;
            const rLon = lon + (Math.random() - 0.5) * 0.004;
            
            const icon = L.divIcon({
                className: '',
                html: `<div class="radar-pulse" id="marker-${alerta.id}"></div>`,
                iconSize: [20, 20]
            });

            const marker = L.marker([rLat, rLon], { icon: icon }).addTo(camadaAlertas);
            
            // LOGICA DE CLIQUE NO MAPA -> VAI PARA ABA ALERTAS
            marker.on('click', () => {
                irParaAlerta(alerta.id);
            });
        });
    }

    function gerarListaAlertas() {
        const container = document.getElementById('lista-alertas');
        container.innerHTML = DATABASE_ALERTAS.map(a => `
            <div class="card-alerta" id="card-${a.id}">
                <div class="alerta-meta">ID: #${a.id} | ${a.tipo}</div>
                <div class="alerta-titulo">${a.titulo}</div>
                <p style="margin: 10px 0;">${a.desc}</p>
                <div style="font-weight: bold; color: var(--azul); font-size: 0.8rem;">Status: ${a.status}</div>
            </div>
        `).join('');
    }

    function irParaAlerta(alertaId) {
        switchTab('alertas');
        
        // Pequeno atraso para garantir que a aba abriu
        setTimeout(() => {
            const el = document.getElementById(`card-${alertaId}`);
            if(el) {
                // Remove destaques anteriores
                document.querySelectorAll('.card-alerta').forEach(c => c.classList.remove('highlight'));
                
                // Destaca o selecionado
                el.classList.add('highlight');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 300);
    }
</script>
</body>
</html>
