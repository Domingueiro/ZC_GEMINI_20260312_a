<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Direta — Zelador Cívico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --ouro: #FFD700; --laranja: #e67e22; --azul: #003f6b; --bg: #f5f2ec; }
        body { background: var(--bg); font-family: 'Barlow', sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .modulo-emendas { 
            background: white; width: 100%; max-width: 450px; 
            border-radius: 15px; border: 2px solid #000; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .topo-preto { background: #000; color: var(--ouro); padding: 15px; text-align: center; border-bottom: 2px solid var(--ouro); }
        .topo-preto h2 { font-family: 'Bebas Neue'; letter-spacing: 2px; margin: 0; font-size: 24px; }

        .conteudo { padding: 20px; text-align: center; }

        .controles-trimestre { display: flex; gap: 5px; margin-bottom: 25px; }
        .btn-tri { 
            flex: 1; padding: 10px 5px; border: 1px solid #000; background: #fff; 
            font-family: 'DM Mono'; font-size: 11px; font-weight: bold; cursor: pointer;
        }
        .btn-tri.active { background: #000; color: var(--ouro); }

        .chart-container { position: relative; height: 340px; margin-bottom: 20px; cursor: pointer; }

        /* PAINEL DE INFORMAÇÃO SEM BOTÃO */
        .painel-feedback { 
            text-align: center; background: #000; border-radius: 8px; 
            padding: 20px; border: 1px solid var(--ouro); transition: 0.3s;
        }
        .desc-auditoria { 
            font-family: 'DM Mono'; font-size: 14px; color: var(--ouro); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        /* Efeito de destaque ao clicar */
        .feedback-active { background: var(--laranja); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="modulo-emendas">
    <div class="topo-preto"><h2>AUDITORIA TERRITORIAL</h2></div>

    <div class="conteudo">
        <div class="controles-trimestre">
            <button class="btn-tri active" onclick="selecionarTri(0, this)">1º TRI</button>
            <button class="btn-tri" onclick="selecionarTri(1, this)">2º TRI</button>
            <button class="btn-tri" onclick="selecionarTri(2, this)">3º TRI</button>
            <button class="btn-tri" onclick="selecionarTri(3, this)">4º TRI</button>
        </div>

        <div class="chart-container">
            <canvas id="graficoDestinoEmendas"></canvas>
        </div>

        <div class="painel-feedback" id="painel-info">
            <span id="texto-status" class="desc-auditoria">Toque em uma área para detalhar</span>
        </div>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);

    const ctx = document.getElementById('graficoDestinoEmendas').getContext('2d');
    const textoStatus = document.getElementById('texto-status');
    const painelInfo = document.getElementById('painel-info');

    const dadosTrimestres = [
        { dados: [45, 15, 20, 20], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] },
        { dados: [20, 40, 10, 30], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] },
        { dados: [15, 15, 50, 20], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] },
        { dados: [25, 25, 20, 30], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] }
    ];

    const grafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: dadosTrimestres[0].labels,
            datasets: [{
                data: dadosTrimestres[0].dados,
                backgroundColor: ['#e67e22', '#003f6b', '#FFD700', '#d32f2f'],
                borderColor: '#000',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    color: '#000',
                    font: { family: 'DM Mono', weight: 'bold', size: 11 },
                    formatter: (value, ctx) => {
                        let label = ctx.chart.data.labels[ctx.dataIndex];
                        return label + '\n' + value + '%';
                    },
                    anchor: 'center',
                    backgroundColor: 'rgba(255,215,0,0.9)',
                    borderRadius: 4,
                    padding: 6
                }
            },
            cutout: '55%',
            onClick: (evt, activeElements) => {
                if (activeElements.length > 0) {
                    const index = activeElements[0].index;
                    const label = grafico.data.labels[index];
                    const valor = grafico.data.datasets[0].data[index];
                    executarRedirecionamento(label, valor);
                }
            }
        }
    });

    function executarRedirecionamento(label, valor) {
        // Feedback visual imediato
        painelInfo.classList.add('feedback-active');
        textoStatus.innerText = `ACESSANDO: ${label} (${valor}%)`;

        // Pequeno delay para o usuário perceber o clique antes de mudar de tela
        setTimeout(() => {
            window.location.href = `detalhamento.html#${label.toLowerCase()}`;
        }, 400);
    }

    function selecionarTri(indice, botao) {
        document.querySelectorAll('.btn-tri').forEach(b => b.classList.remove('active'));
        botao.classList.add('active');

        grafico.data.datasets[0].data = dadosTrimestres[indice].dados;
        grafico.update();

        textoStatus.innerText = "Toque em uma área para detalhar";
        painelInfo.classList.remove('feedback-active');
    }
</script>

</body>
</html>
