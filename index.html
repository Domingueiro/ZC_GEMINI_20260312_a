<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Operacional — Zelador Cívico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --ouro: #FFD700; --laranja: #e67e22; --azul: #003f6b; --bg: #f5f2ec; }
        body { background: var(--bg); font-family: 'Barlow', sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .modulo-emendas { 
            background: white; width: 100%; max-width: 450px; 
            border-radius: 15px; border: 2px solid #000; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .topo-preto { background: #000; color: var(--ouro); padding: 15px; text-align: center; border-bottom: 2px solid var(--ouro); }
        .topo-preto h2 { font-family: 'Bebas Neue'; letter-spacing: 2px; margin: 0; font-size: 24px; }

        .conteudo { padding: 20px; text-align: center; }

        .controles-trimestre { display: flex; gap: 5px; margin-bottom: 25px; }
        .btn-tri { 
            flex: 1; padding: 10px 5px; border: 1px solid #000; background: #fff; 
            font-family: 'DM Mono'; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-tri.active { background: #000; color: var(--ouro); }

        .chart-container { position: relative; height: 320px; margin-bottom: 25px; cursor: crosshair; }

        .painel-detalhe { text-align: left; background: #fffcf0; border: 1px solid #ddd; border-radius: 8px; padding: 15px; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; }
        .titulo-auditoria { color: var(--laranja); font-family: 'Syne'; font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .desc-auditoria { font-size: 16px; font-weight: 600; line-height: 1.2; margin-bottom: 15px; color: var(--azul); }
        
        .atalho-link { 
            display: inline-flex; align-items: center; background: #000; color: #fff; 
            padding: 12px; border-radius: 5px; text-decoration: none; font-family: 'DM Mono'; 
            font-size: 11px; font-weight: bold; transition: 0.3s; width: 100%; justify-content: center;
            opacity: 0.5; pointer-events: none; /* Desativado até selecionar fatia */
        }
        .atalho-link.active { opacity: 1; pointer-events: auto; background: var(--azul); }
        .atalho-link span { margin-left: 8px; color: var(--ouro); }
    </style>
</head>
<body>

<div class="modulo-emendas">
    <div class="topo-preto"><h2>AUDITORIA DE DESTINO</h2></div>

    <div class="conteudo">
        <div class="controles-trimestre">
            <button class="btn-tri active" onclick="selecionarTri(0, this)">1º TRI</button>
            <button class="btn-tri" onclick="selecionarTri(1, this)">2º TRI</button>
            <button class="btn-tri" onclick="selecionarTri(2, this)">3º TRI</button>
            <button class="btn-tri" onclick="selecionarTri(3, this)">4º TRI</button>
        </div>

        <div class="chart-container">
            <canvas id="graficoDestinoEmendas"></canvas>
        </div>

        <div class="painel-detalhe">
            <div>
                <strong class="titulo-auditoria">🔍 Auditoria Territorial</strong>
                <span id="info-texto" class="desc-auditoria">Selecione uma área no gráfico para detalhar</span>
            </div>
            
            <a href="#" class="atalho-link" id="btn-detalhar">
                DETALHAR INVESTIMENTO EM <span id="label-selecionada">...</span>
            </a>
        </div>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels); // Ativa o plugin de labels

    const ctx = document.getElementById('graficoDestinoEmendas').getContext('2d');
    const infoTexto = document.getElementById('info-texto');
    const btnDetalhar = document.getElementById('btn-detalhar');
    const labelSelecionada = document.getElementById('label-selecionada');

    const dadosTrimestres = [
        { dados: [45, 15, 20, 20], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] },
        { dados: [20, 40, 10, 30], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] },
        { dados: [15, 15, 50, 20], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] },
        { dados: [25, 25, 20, 30], labels: ['Asfalto', 'Saúde', 'Cultura', 'ONGs'] }
    ];

    const grafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: dadosTrimestres[0].labels,
            datasets: [{
                data: dadosTrimestres[0].dados,
                backgroundColor: ['#e67e22', '#003f6b', '#FFD700', '#d32f2f'],
                borderColor: '#000',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }, // REGRAS: Retira a legenda
                datalabels: { // REGRAS: Exibe info e percentual no gráfico
                    color: '#000',
                    font: { family: 'DM Mono', weight: 'bold', size: 10 },
                    formatter: (value, ctx) => {
                        let label = ctx.chart.data.labels[ctx.dataIndex];
                        return label + '\n' + value + '%';
                    },
                    anchor: 'end',
                    align: 'start',
                    offset: 10,
                    backgroundColor: 'rgba(255,215,0,0.8)',
                    borderRadius: 3,
                    padding: 4
                }
            },
            cutout: '60%',
            onClick: (evt, activeElements) => {
                if (activeElements.length > 0) {
                    const index = activeElements[0].index;
                    const valor = grafico.data.datasets[0].data[index];
                    const label = grafico.data.labels[index];
                    atualizarPainel(label, valor);
                }
            }
        }
    });

    function atualizarPainel(label, valor) {
        infoTexto.innerText = `${label}: Corresponde a ${valor}% das emendas deste período.`;
        labelSelecionada.innerText = label.toUpperCase();
        
        // Ativa o botão e define o link com âncora para destacar na outra tela
        btnDetalhar.classList.add('active');
        btnDetalhar.href = `detalhamento.html#section-${label.toLowerCase()}`;
    }

    function selecionarTri(indice, botao) {
        document.querySelectorAll('.btn-tri').forEach(b => b.classList.remove('active'));
        botao.classList.add('active');

        grafico.data.datasets[0].data = dadosTrimestres[indice].dados;
        grafico.update();

        // Reseta o painel ao trocar o trimestre
        infoTexto.innerText = "Selecione uma área no gráfico para detalhar";
        labelSelecionada.innerText = "...";
        btnDetalhar.classList.remove('active');
    }
</script>

</body>
</html>
