<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --cinza2: #dde1e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; }

        /* --- PORTAL DE ENTRADA --- */
        #portal-entrada {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .portal-card { 
            text-align: center; max-width: 500px; width: 100%; 
            padding: 40px; background: white; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--cinza2);
        }
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--accent); margin-bottom: 10px; }

        .lema-destaque {
            background: #000; color: var(--ouro-alaranjado);
            font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700;
            text-transform: uppercase; padding: 15px; border-radius: 10px;
            margin: 20px 0 30px; border: 2px solid var(--ouro-alaranjado);
        }

        .input-group { display: flex; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .input-group input { flex: 1; border: none; padding: 15px; font-family: 'DM Mono'; font-size: 20px; outline: none; }
        .btn-entrar { background: var(--accent); color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        
        .btn-geo { width: 100%; padding: 15px; border: 2px solid var(--accent); border-radius: 10px; background: white; font-family: 'Syne'; font-weight: 700; cursor: pointer; }

        /* --- SISTEMA PRINCIPAL --- */
        #sistema-auditoria { display: none; }
        header { background: var(--azul); color: var(--white); padding: 15px; text-align: center; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid var(--cinza2); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-family: 'Syne'; font-weight: 700; color: var(--muted); cursor: pointer; }
        .tab-btn.active { color: var(--azul); border-bottom: 3px solid var(--azul); }

        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        #map { height: 350px; border-radius: 10px; border: 1px solid var(--cinza2); margin-bottom: 15px; }

        /* ALERTAS */
        .card-alerta { background: white; border-left: 5px solid var(--vermelho); padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-alerta.piscante { animation: pulse-bg 1.5s infinite; }
        @keyframes pulse-bg { 0% { background: white; } 50% { background: #fff0f0; } 100% { background: white; } }

        /* RADAR */
        .radar-icon { width: 15px; height: 15px; background: var(--vermelho); border-radius: 50%; border: 2px solid white; position: relative; }
        .radar-icon::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--vermelho); border-radius: 50%; animation: pulse-radar 1.2s infinite; opacity: 0.5; }
        @keyframes pulse-radar { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="lema-destaque">Transformando Visão em Poder</div>
        <div class="input-group">
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9">
            <button class="btn-entrar" onclick="acessarComCep()">OK</button>
        </div>
        <button class="btn-geo" onclick="acessarComGeo()">📍 USAR LOCALIZAÇÃO</button>
    </div>
</div>

<div id="sistema-auditoria">
    <header>
        <h2 style="font-family: 'Bebas Neue'; color: var(--ouro);">⚖ ZELADOR CÍVICO</h2>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('radar', this)">RADAR</button>
        <button class="tab-btn" onclick="mudarAba('alertas', this)">ALERTAS</button>
        <button class="tab-btn" onclick="mudarAba('investimento', this)">INVESTIMENTO</button>
    </div>

    <div id="tab-radar" class="tab-content active">
        <div id="map"></div>
    </div>

    <div id="tab-alertas" class="tab-content">
        <div id="lista-alertas">
            </div>
    </div>

    <div id="tab-investimento" class="tab-content">
        <div style="text-align: center; padding: 40px;">
            <h3>Arrecadação vs. Investimento</h3>
            <p>Dados em processamento...</p>
        </div>
    </div>
</div>

<script>
    var mapa = null;
    var markersLayer = L.layerGroup();
    const ALERTAS_DB = [
        { id: 1, titulo: "Sobrepreço Detectado", desc: "Licitação de asfalto com valores suspeitos." },
        { id: 2, titulo: "Obra Paralisada", desc: "Creche local sem operários há 60 dias." }
    ];

    // Máscara Simples
    document.getElementById('cep-input').oninput = function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
        e.target.value = v;
    };

    function mudarAba(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        if(id === 'radar' && mapa) mapa.invalidateSize();
    }

    function acessarComCep() {
        const cep = document.getElementById('cep-input').value.replace(/\D/g, '');
        if(cep.length === 8) iniciar(cep);
    }

    function iniciar(cep) {
        document.getElementById('portal-entrada').style.display = 'none';
        document.getElementById('sistema-auditoria').style.display = 'block';
        
        if(!mapa) {
            mapa = L.map('map').setView([-23.55, -46.63], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            markersLayer.addTo(mapa);
        }

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(d => {
                const busca = d.logradouro + ", São Paulo";
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(busca)}`)
                    .then(r => r.json())
                    .then(g => {
                        if(g[0]) {
                            const lat = parseFloat(g[0].lat), lon = parseFloat(g[0].lon);
                            mapa.setView([lat, lon], 15);
                            L.marker([lat, lon]).addTo(mapa);
                            plotaRadar(lat, lon);
                        }
                    });
                renderAlertas();
            });
    }

    function plotaRadar(lat, lon) {
        markersLayer.clearLayers();
        ALERTAS_DB.forEach(a => {
            const icon = L.divIcon({ className: '', html: '<div class="radar-icon"></div>', iconSize: [15, 15] });
            const m = L.marker([lat + (Math.random()-0.5)*0.01, lon + (Math.random()-0.5)*0.01], { icon: icon });
            m.addTo(markersLayer).on('click', () => {
                mudarAba('alertas', document.querySelectorAll('.tab-btn')[1]);
                destacarAlerta(a.id);
            });
        });
    }

    function renderAlertas() {
        document.getElementById('lista-alertas').innerHTML = ALERTAS_DB.map(a => `
            <div class="card-alerta" id="alerta-${a.id}">
                <strong>${a.titulo}</strong>
                <p>${a.desc}</p>
            </div>
        `).join('');
    }

    function destacarAlerta(id) {
        setTimeout(() => {
            const el = document.getElementById('alerta-' + id);
            if(el) {
                el.classList.add('piscante');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 200);
    }

    function acessarComGeo() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('portal-entrada').style.display = 'none';
            document.getElementById('sistema-auditoria').style.display = 'block';
            iniciar("01001000"); // CEP Genérico para carregar, depois centraliza no GPS
        });
    }
</script>
</body>
</html>
