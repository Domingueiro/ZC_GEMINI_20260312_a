<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Emendas — Zelador Cívico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { background: #f5f2ec; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .modulo-emendas { 
            background: white; width: 100%; max-width: 400px; 
            border-radius: 15px; border: 2px solid #000; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .topo-preto { background: #000; color: #FFD700; padding: 15px; text-align: center; }
        .topo-preto h2 { font-family: 'Bebas Neue'; letter-spacing: 2px; margin: 0; }

        .conteudo { padding: 20px; text-align: center; }
        
        .ano-box { 
            display: inline-block; background: #000; color: #FFD700; 
            font-family: 'DM Mono'; font-size: 20px; padding: 5px 15px; 
            border-radius: 5px; margin-bottom: 20px;
        }

        .chart-container { position: relative; height: 300px; margin-bottom: 20px; }

        .legenda-auditoria { 
            background: #fffcf0; border: 1px dashed #e67e22; 
            padding: 15px; border-radius: 8px; text-align: left;
        }
        .legenda-auditoria strong { color: #e67e22; font-family: 'Syne'; font-size: 12px; }
        .legenda-auditoria p { font-size: 13px; margin-top: 5px; color: #444; line-height: 1.4; }
    </style>
</head>
<body>

<div class="modulo-emendas">
    <div class="topo-preto">
        <h2>DESTINO DAS EMENDAS</h2>
    </div>

    <div class="conteudo">
        <div class="ano-box" id="display-ano">QUADRIMESTRE 1</div>

        <div class="chart-container">
            <canvas id="graficoDestinoEmendas"></canvas>
        </div>

        <div class="legenda-auditoria">
            <strong>🔍 AUDITORIA DE FLUXO</strong>
            <p id="info-texto">Asfalto e Recapeamento lideram a concentração de emendas neste período.</p>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('graficoDestinoEmendas').getContext('2d');
    const displayAno = document.getElementById('display-ano');
    const infoTexto = document.getElementById('info-texto');

    // Dados que mudam dinamicamente simulando a distribuição de emendas
    const ciclosEmendas = [
        {
            label: "QUADRIMESTRE 1",
            dados: [45, 15, 20, 20],
            texto: "Forte concentração em Obras de Asfalto (45%) via emendas impositivas."
        },
        {
            label: "QUADRIMESTRE 2",
            dados: [20, 40, 10, 30],
            texto: "Mudança de fluxo para Saúde Bucal e ONGs Esportivas neste período."
        },
        {
            label: "QUADRIMESTRE 3",
            dados: [10, 10, 60, 20],
            texto: "Pico de emendas destinadas a Eventos e Reformas de Praças (60%)."
        }
    ];

    let indiceAtual = 0;

    const grafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Asfalto', 'Saúde', 'Praças/Eventos', 'ONGs'],
            datasets: [{
                data: ciclosEmendas[0].dados,
                backgroundColor: ['#e67e22', '#003f6b', '#FFD700', '#d32f2f'],
                borderColor: '#000',
                borderWidth: 2,
                hoverOffset: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { font: { family: 'DM Mono', size: 10 }, color: '#000' }
                }
            },
            cutout: '65%' // Deixa o furo do meio maior para parecer um radar
        }
    });

    // Animação do Tempo
    setInterval(() => {
        indiceAtual = (indiceAtual + 1) % ciclosEmendas.length;
        
        const novoCiclo = ciclosEmendas[indiceAtual];
        
        displayAno.innerText = novoCiclo.label;
        infoTexto.innerText = novoCiclo.texto;
        
        grafico.data.datasets[0].data = novoCiclo.dados;
        grafico.update();
    }, 4000); // Muda a cada 4 segundos
</script>

</body>
</html>
