<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --cinza2: #dde1e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* --- PORTAL DE ENTRADA --- */
        #portal-entrada { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal-card { text-align: center; max-width: 500px; width: 100%; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--cinza2); }
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--accent); margin-bottom: 10px; }
        .lema-destaque { background: #000; color: var(--ouro-alaranjado); font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; padding: 15px; border-radius: 10px; margin: 20px 0 30px; border: 2px solid var(--ouro-alaranjado); }

        .input-group { display: flex; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; margin-bottom: 15px; background: white; }
        .input-group input { flex: 1; border: none; padding: 18px; font-family: 'DM Mono'; font-size: 22px; outline: none; width: 100%; }
        .btn-entrar { background: var(--accent); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .btn-geo { width: 100%; padding: 15px; border: 2px solid var(--accent); border-radius: 10px; background: white; font-family: 'Syne'; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* --- SISTEMA PRINCIPAL --- */
        #sistema-auditoria { display: none; }
        header { background: var(--azul); color: var(--white); padding: 15px; text-align: center; }
        .tabs { display: flex; background: white; border-bottom: 1px solid var(--cinza2); position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-family: 'Syne'; font-weight: 700; color: var(--muted); cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .tab-btn.active { color: var(--azul); border-bottom: 3px solid var(--azul); }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        
        #map { height: 380px; border-radius: 10px; border: 1px solid var(--cinza2); margin-bottom: 15px; z-index: 1; }

        /* ALERTAS */
        .btn-limpar { width: 100%; padding: 10px; margin-bottom: 15px; background: var(--cinza2); border: none; border-radius: 8px; font-family: 'DM Mono'; font-size: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .card-alerta { background: white; border-left: 6px solid var(--vermelho); padding: 18px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--cinza2); transition: all 0.3s ease; }
        @keyframes pulse-bg { 0% { background: white; } 50% { background: #fff0f0; box-shadow: 0 0 15px rgba(211, 47, 47, 0.2); } 100% { background: white; } }
        .card-alerta.piscante { animation: pulse-bg 1.5s infinite; border-left-width: 12px; transform: scale(1.02); z-index: 10; }

        /* RADAR NO MAPA */
        .radar-icon { width: 18px; height: 18px; background: var(--vermelho); border-radius: 50%; border: 2px solid white; position: relative; cursor: pointer; }
        .radar-icon::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--vermelho); border-radius: 50%; animation: pulse-radar 1.2s infinite; opacity: 0.5; top: 0; left: 0; }
        @keyframes pulse-radar { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="lema-destaque">Visão em Poder</div>
        <div class="input-group">
            <input type="text" id="cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
            <button class="btn-entrar" onclick="acessarComCep()">OK</button>
        </div>
        <button class="btn-geo" onclick="acessarComGeo()">📍 USAR LOCALIZAÇÃO</button>
    </div>
</div>

<div id="sistema-auditoria">
    <header>
        <h2 style="font-family: 'Bebas Neue'; color: var(--ouro); letter-spacing: 2px;">⚖ ZELADOR CÍVICO</h2>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('radar', this)">RADAR</button>
        <button class="tab-btn" onclick="mudarAba('alertas', this)">ALERTAS</button>
        <button class="tab-btn" onclick="mudarAba('investimento', this)">INVESTIMENTO</button>
    </div>

    <div id="tab-radar" class="tab-content active">
        <div id="map"></div>
        <p style="text-align: center; font-size: 11px; color: var(--muted); font-family: 'DM Mono';">CLIQUE NOS PONTOS PULSANTES</p>
    </div>

    <div id="tab-alertas" class="tab-content">
        <button class="btn-limpar" onclick="limparDestaques()">✕ LIMPAR AUDITORIA</button>
        <div id="lista-alertas"></div>
    </div>

    <div id="tab-investimento" class="tab-content">
        <div style="text-align: center; padding: 40px;">
            <h3 style="font-family: 'Syne'; margin-bottom: 10px;">Arrecadação vs. Investimento</h3>
            <p style="font-family: 'DM Mono'; font-size: 14px; color: var(--muted);">Analisando dados de emendas parlamentares para este CEP...</p>
        </div>
    </div>
</div>

<script>
    var mapa = null;
    var markersLayer = L.layerGroup();
    
    // Banco de Dados de Alertas (Simulação)
    const ALERTAS_DB = [
        { id: 1, titulo: "Sobrepreço em Licitação", desc: "Identificado valor 40% acima da média para recapeamento nesta região.", status: "Auditoria" },
        { id: 2, titulo: "Obra Paralisada", desc: "Reforma de praça sem atividade há 60 dias, apesar de pagamento liberado.", status: "Fiscalização" }
    ];

    // Lógica da Máscara de CEP (O que evita o erro do hífen)
    document.getElementById('cep-input').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 5) v = v.substring(0, 5) + '-' + v.substring(5, 8);
        e.target.value = v;
    });

    function mudarAba(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        if(id === 'radar' && mapa) {
            setTimeout(() => mapa.invalidateSize(), 200);
        }
    }

    function acessarComCep() {
        const val = document.getElementById('cep-input').value.replace(/\D/g, '');
        if(val.length === 8) iniciarSistema(val);
        else alert("Por favor, digite o CEP completo.");
    }

    function iniciarSistema(cep) {
        document.getElementById('portal-entrada').style.display = 'none';
        document.getElementById('sistema-auditoria').style.display = 'block';
        
        if(!mapa) {
            mapa = L.map('map').setView([-23.55, -46.63], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            markersLayer.addTo(mapa);
        }

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(d => {
                const query = (d.logradouro || d.bairro) + ", São Paulo";
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                    .then(r => r.json())
                    .then(g => {
                        if(g[0]) {
                            const lat = parseFloat(g[0].lat), lon = parseFloat(g[0].lon);
                            mapa.setView([lat, lon], 16);
                            L.marker([lat, lon]).addTo(mapa).bindPopup("Área Selecionada").openPopup();
                            gerarPontosRadar(lat, lon);
                        }
                    });
                renderAlertas();
            });
    }

    function gerarPontosRadar(lat, lon) {
        markersLayer.clearLayers();
        ALERTAS_DB.forEach(a => {
            const icon = L.divIcon({ className: '', html: '<div class="radar-icon"></div>', iconSize: [18, 18] });
            const m = L.marker([lat + (Math.random()-0.5)*0.005, lon + (Math.random()-0.5)*0.005], { icon: icon });
            m.addTo(markersLayer).on('click', () => {
                mudarAba('alertas', document.querySelectorAll('.tab-btn')[1]);
                focarNoAlerta(a.id);
            });
        });
    }

    function renderAlertas() {
        document.getElementById('lista-alertas').innerHTML = ALERTAS_DB.map(a => `
            <div class="card-alerta" id="alerta-${a.id}">
                <strong style="color:var(--vermelho); text-transform:uppercase;">${a.titulo}</strong>
                <p style="margin:10px 0; font-size:14px;">${a.desc}</p>
                <small>STATUS: ${a.status}</small>
            </div>
        `).join('');
    }

    function focarNoAlerta(id) {
        // CORREÇÃO: Limpa todos antes de pulsar o novo
        limparDestaques();
        setTimeout(() => {
            const el = document.getElementById('alerta-' + id);
            if(el) {
                el.classList.add('piscante');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 300);
    }

    function limparDestaques() {
        document.querySelectorAll('.card-alerta').forEach(c => c.classList.remove('piscante'));
    }

    function acessarComGeo() {
        if (!navigator.geolocation) return alert("GPS não suportado.");
        navigator.geolocation.getCurrentPosition(() => iniciarSistema("01001000"), () => alert("Erro ao obter GPS."));
    }
</script>
</body>
</html>
