<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico — Auditoria Territorial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --bg: #f5f2ec; --accent: #1a3a5c; --muted: #8a8478; --white: #ffffff;
            --azul: #003f6b; --azul-vivo: #005fa3; --ouro: #FFD700; --ouro-alaranjado: #FFB800;
            --vermelho: #d32f2f; --vermelho-alerta: rgba(211, 47, 47, 0.2);
            --verde: #2e7d32; --cinza: #f0f2f5; --cinza2: #dde1e7; --texto: #1a1e27;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* --- TELA INICIAL (PORTAL) --- */
        #portal-entrada {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }
        .portal-card { text-align: center; max-width: 500px; width: 100%; padding: 50px 40px; background: rgba(255, 255, 255, 0.4); border-radius: 28px; backdrop-filter: blur(10px); border: 1px solid rgba(26, 58, 92, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .portal-card h1 { font-family: 'DM Serif Display', serif; font-size: 48px; margin: 0; color: var(--accent); letter-spacing: -1px; }

        /* NOVO ÍCONE DO LEMA (LETRA GRANDE E IMPACTANTE) */
        .portal-lema-icon {
            display: block; width: 100%; background-color: #000000; color: var(--ouro-alaranjado);
            font-family: 'Syne', sans-serif; /* Mesma fonte do título */
            font-size: 26px; /* Letra grande, quase tamanho do título */
            text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
            padding: 15px 25px; border-radius: 12px; margin: 15px 0 45px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid var(--ouro-alaranjado);
        }

        .opcoes-container { display: flex; flex-direction: column; gap: 18px; width: 100%; }
        .portal-input-group { display: flex; align-items: center; background: var(--white); border: 2px solid var(--accent); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .btn-trigger-cep { background: var(--accent); color: white; font-family: 'DM Mono', monospace; font-weight: bold; padding: 18px 25px; cursor: pointer; border: none; font-size: 16px; }
        .portal-input-group input { border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 22px; width: 100%; padding: 12px 20px; background: transparent; color: var(--accent); }
        .portal-divisor { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin: 8px 0; text-transform: uppercase; letter-spacing: 1px; }
        .btn-geo-full { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--white); color: var(--accent); border: 2px solid var(--accent); border-radius: 14px; padding: 18px; font-weight: 700; cursor: pointer; font-family: 'Syne'; font-size: 15px; text-transform: uppercase; transition: all 0.2s; }
        .btn-geo-full:hover { background: var(--accent); color: white; }

        /* --- SISTEMA (ZELADOR) --- */
        #sistema-auditoria { display: none; }
        header { background: var(--azul); color: var(--white); padding: 18px 20px 14px; text-align: center; }
        header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.12em; color: var(--ouro); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .lema-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-top: 4px; }
        
        #map { height: 300px; margin: 12px; border-radius: 12px; border: 2px solid var(--cinza2); z-index: 1; }
        .card { background: var(--white); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 12px; padding: 16px; }
        .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--azul); margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--cinza2); padding-bottom: 5px; }

        .metricas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 12px 12px; }
        .metrica { background: var(--white); border-radius: 10px; padding: 14px; border-top: 4px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .metrica-label { font-size: 0.65rem; color: #888; font-weight: 700; text-transform: uppercase; }
        .metrica-valor { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--texto); margin-top: 4px; }

        .ia-box { background: #f0f4f8; border: 1px solid #d1d9e0; border-radius: 10px; padding: 14px; }
        .ia-texto { font-size: 0.9rem; color: #333; line-height: 1.6; }
        .alerta-item { border-left: 5px solid var(--vermelho); background: #fff5f5; padding: 12px; margin-bottom: 10px; border-radius: 4px; font-size: 0.85rem; }
        .obra-item { background: var(--cinza); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--cinza2); }
        
        #status-wrap { display: none; margin: 12px; background: var(--azul); border-radius: 8px; padding: 15px; color: white; align-items: center; justify-content: center; gap: 12px; z-index: 1000; position: relative;}
        .spin { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.2); border-top-color: var(--ouro); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .bairro-header { background: linear-gradient(135deg, var(--azul), var(--azul-vivo)); border-radius: 12px; margin: 0 12px 12px; padding: 20px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bairro-nome { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--ouro); letter-spacing: 1px; }
        .rua-detalhe { font-family: 'DM Mono'; font-size: 0.75rem; opacity: 0.9; margin-top: 5px; }

        /* ESTILO DOS PONTOS PULSANTES (RADAR) */
        @keyframes pulse-red {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .radar-pulse {
            width: 20px; height: 20px; background-color: var(--vermelho);
            border-radius: 50%; position: absolute;
            border: 2px solid white; box-shadow: 0 0 10px rgba(211,47,47,0.5);
        }
        .radar-pulse::after {
            content: ''; width: 100%; height: 100%; background-color: var(--vermelho-alerta);
            border-radius: 50%; position: absolute; top: 0; left: 0;
            animation: pulse-red 1.5s infinite;
        }
    </style>
</head>
<body>

<div id="portal-entrada">
    <div class="portal-card">
        <h1>Zelador Cívico</h1>
        <div class="portal-lema-icon">Transformando Visão em Poder</div>
        <div class="opcoes-container">

                <input type="text" id="portal-cep-input" placeholder="00000-000" maxlength="9" inputmode="numeric">
            </div>
            <div class="portal-divisor">— OU —</div>
            <button class="btn-geo
